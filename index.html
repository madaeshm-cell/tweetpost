<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsFlow - Real-time News Aggregator</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <i class="fas fa-newspaper"></i>
                    <h1>NewsFlow</h1>
                    <span class="live-badge">
                        <span class="pulse"></span>
                        LIVE
                    </span>
                </div>
                
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search news..." autocomplete="off">
                    <button id="searchBtn"><i class="fas fa-search"></i></button>
                </div>

                <div class="header-controls">
                    <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i></button>
                    <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync"></i></button>
                    <span id="lastUpdate" class="last-update">Loading...</span>
                </div>
            </div>
        </div>
    </header>

    <nav class="category-nav">
        <div class="container">
            <div class="categories">
                <button class="category-btn active" data-category="all"><i class="fas fa-globe"></i> All News</button>
                <button class="category-btn" data-category="entertainment"><i class="fas fa-film"></i> Entertainment</button>
                <button class="category-btn" data-category="politics"><i class="fas fa-landmark"></i> Politics</button>
                <button class="category-btn" data-category="finance"><i class="fas fa-chart-line"></i> Finance</button>
                <button class="category-btn" data-category="tech"><i class="fas fa-microchip"></i> Tech</button>
                <button class="category-btn" data-category="rumors"><i class="fas fa-question-circle"></i> Rumors</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <section class="trending-section">
                <h2>🔥 Trending Now</h2>
                <div id="trendingContainer" class="trending-slider"></div>
            </section>

            <section class="news-section">
                <div class="news-header">
                    <h2>News Feed</h2>
                    <div class="sort-controls">
                        <button id="sortBtn" class="sort-btn"><i class="fas fa-sort"></i> Latest</button>
                        <select id="sourceFilter" class="source-filter">
                            <option value="all">All Sources</option>
                            <option value="bbc">BBC</option>
                            <option value="cnn">CNN</option>
                            <option value="reuters">Reuters</option>
                            <option value="techcrunch">TechCrunch</option>
                            <option value="reddit">Reddit</option>
                            <option value="hackernews">Hacker News</option>
                        </select>
                    </div>
                </div>

                <div id="activeFilters" class="active-filters"></div>

                <div id="newsContainer" class="news-grid"></div>

                <div id="loadingState" class="loading-state">
                    <div class="spinner"></div>
                    <p>Fetching latest news from multiple sources...</p>
                </div>

                <div id="noResults" class="no-results" style="display: none;">
                    <i class="fas fa-inbox"></i>
                    <p>No news found</p>
                </div>

                <div class="load-more-container">
                    <button id="loadMoreBtn" class="load-more-btn" style="display:none;">
                        Load More <i class="fas fa-arrow-down"></i>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 NewsFlow. Real-time News Aggregator. Built with ❤️</p>
            <div class="footer-links">
                <a href="#about">About</a>
                <a href="#privacy">Privacy</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
